<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | ForgeXplorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
class="min-h-screen flex items-center justify-center bg-cover bg-center text-white"
style="background-image: url('/static/images/reg.jpg');"
>

<!-- FLASH MESSAGE -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div id="flash-message" class="absolute top-10 left-1/2 transform -translate-x-1/2 space-y-2">

{% for category, message in messages %}
<div class="px-6 py-3 rounded-lg shadow-lg
{% if category == 'success' %}
bg-green-500
{% else %}
bg-red-500
{% endif %}
text-white font-semibold text-center">

{{ message }}

</div>
{% endfor %}

</div>
{% endif %}
{% endwith %}

<!-- REGISTER CARD -->
<div class="w-full max-w-md bg-white/10 backdrop-blur-xl rounded-3xl p-10 shadow-2xl">

<h2 class="text-4xl font-extrabold text-center mb-4">
Forge<span class="text-cyan-400">Xplorer</span>
</h2>

<p class="text-center text-gray-300 mb-6">
Create a new account
</p>

<form method="post" class="space-y-6">

<input
type="email"
name="email"
placeholder="Enter your email"
required
class="w-full px-4 py-3 rounded-lg bg-white/10 text-white
border border-white/20 focus:outline-none
focus:border-cyan-400"
>

<input
type="password"
name="password"
placeholder="Create password"
required
class="w-full px-4 py-3 rounded-lg bg-white/10 text-white
border border-white/20 focus:outline-none
focus:border-purple-400"
>

<button
type="submit"
class="w-full py-3 rounded-full
bg-gradient-to-r from-cyan-400 to-purple-500
text-white font-semibold text-lg
hover:scale-105 transition duration-300 shadow-lg">
Register
</button>

</form>

<div class="flex items-center justify-center gap-3 mt-6">

  <p class="text-gray-400 hover:text-white text-lg">Already have an account?</p>  
<a href="/login" class="text-green-400 hover:text-white text-lg font-bold">
 Login
</a>
</div>

<div class="text-center mt-4">
<a href="/" class="text-gray-400 hover:text-white text-lg font-bold">
 Back to Home
</a>
</div>

</div>

<!-- AUTO HIDE FLASH MESSAGE -->
<script>
setTimeout(function(){
let flash = document.getElementById("flash-message");
if(flash){
flash.style.display = "none";
}
},3000);
</script>

</body>
</html>
